name: Build ISO

on:
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Build ISO
        uses: jasonn3/build-container-installer@main
        id: build
        with:
          image_name: bc250
          image_repo: ghcr.io/mygodess
          image_tag: latest
          variant: Kinoite
          version: 43
          iso_name: bc250-43.iso

      - name: Upload ISO
        uses: actions/upload-artifact@v7
        with:
          name: bc250-iso
          path: |
            ${{ steps.build.outputs.iso_path }}
            ${{ steps.build.outputs.iso_path }}.sha256
          retention-days: 7

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: bc250-43.20260126
          name: BC250 Bazzite 43.20260126
          files: |
            ${{ steps.build.outputs.iso_path }}
            ${{ steps.build.outputs.iso_path }}.sha256

